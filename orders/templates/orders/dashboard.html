{% extends 'base.html' %}
{% block content %}
    <h2>CNC Job Queue</h2>
    <table border="1" style="width:100%; border-collapse: collapse;">
        <thead>
            <tr style="background-color: #f2f2f2;">
                <th>Order ID</th>
                <th>Customer</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
                <tr>
                    <td>{{ order.id }}</td>
                    <td>{{ order.customer_name }}</td>
                    <td>{{ order.status }}</td>
                    <td>
                        <a href="{% url 'order-detail' order.id %}">View Specs</a>
                    </td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="4">No orders in the queue.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock content %}
