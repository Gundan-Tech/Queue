services:
  - type: web
    name: queue-management
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn queue_order_management.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.1
      - key: DJANGO_SETTINGS_MODULE
        value: queue_order_management.settings
